# 零成本冒烟测试：所有 agent 都用 mock CLI，不消耗任何 token。
#   python3 run.py --config config.mock.yaml
topic: "我们该如何为一个公开 API 设计限流？"
language: "中文"
max_rounds: 2
turn_word_limit: 150
per_turn_timeout: 60
document: "DISCUSSION.md"
session: "agent-debate-cli-mock"

drivers:
  mock:
    cmd: ["python3", "tools/mock_cli.py"]
    mode: stdin

organizer:
  name: chair
  driver: mock
  role: "你是讨论组织者。"

agents:
  - name: alice
    driver: mock
    role: "偏好简单方案的系统工程师。"
  - name: bob
    driver: mock
    role: "关注安全与稳定性的评审。"
  - name: carol
    driver: mock
    role: "代表开发者体验。"
