# Zero-cost smoke test: every agent uses the mock CLI, spends no tokens.
#   python3 run.py --config config.mock.yaml
topic: "How should we design rate limiting for a public API?"
language: "English"
max_rounds: 2
turn_word_limit: 150
per_turn_timeout: 60
output_dir: "discussions"
session: "agent-debate-cli-mock"

drivers:
  mock:
    cmd: ["python3", "tools/mock_cli.py"]
    mode: stdin

organizer:
  name: chair
  driver: mock
  role: "You are the discussion organizer."

agents:
  - name: alice
    driver: mock
    role: "A systems engineer who prefers simple solutions."
  - name: bob
    driver: mock
    role: "A reviewer focused on security and stability."
  - name: carol
    driver: mock
    role: "Represents developer experience."
