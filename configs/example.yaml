# ===== Topic and global settings =====
topic: "How should we design rate limiting for a public API?"
language: "English"
max_rounds: 3               # max rounds; ends early once organizer verdict consensus_reached=Yes
turn_word_limit: 200        # word cap per contribution
per_turn_timeout: 300       # per-agent per-call timeout (seconds)

# Output location: leave `document` empty to auto-organize per topic into
#   discussions/<topic>/<timestamp>/{DISCUSSION.md, <agent>.log}
# To write to a fixed file instead, uncomment the next line:
# document: "DISCUSSION.md"
output_dir: "discussions"       # root dir for auto mode
session: "agent-debate-cli"     # tmux session name: tmux attach -t agent-debate-cli

# ===== Drivers: how to invoke each CLI non-interactively =====
#   mode: stdin -> prompt fed via standard input
#   mode: arg   -> prompt as the last argument (use {prompt} placeholder in cmd)
drivers:
  claude:
    # -p = non-interactive print mode; prompt read from stdin, returns plain text.
    # If claude stalls on a permission prompt during a real run, swap in the flagged form:
    #   cmd: ["claude", "-p", "--output-format", "text", "--permission-mode", "dontAsk", "--allowedTools", ""]
    #   (run `claude --help` first to confirm the permission-mode value on your version)
    cmd: ["claude", "-p", "--output-format", "text"]
    mode: stdin
  codex:
    # trailing "-" = read the whole prompt from stdin.
    # --output-last-message {outfile}: driver reads the clean final answer from that temp file
    # instead of codex's noisy stdout (banner / prompt echo / tool logs / duplicated answer).
    cmd: ["codex", "exec", "--output-last-message", "{outfile}", "-"]
    mode: stdin
  mock:
    cmd: ["python3", "tools/mock_cli.py"]
    mode: stdin

# ===== Organizer (MAD's moderator) =====
organizer:
  name: chair
  driver: claude
  role: >
    You are the organizer/chair of a technical roundtable. You open by breaking down the topic,
    assess progress at the end of each round, and converge with a final plan once the discussion
    reaches a clear enough conclusion. You do not speak for others; stay neutral.

# ===== Debaters (add/remove freely, any number) =====
agents:
  - name: alice
    driver: codex
    role: "A senior systems engineer who prefers simple, operable solutions and is wary of over-engineering."
  - name: bob
    driver: claude
    role: "A security and stability reviewer focused on abuse, traffic spikes, fault isolation and graceful degradation."
  - name: carol
    driver: codex
    role: "Represents developer experience: API predictability, error messages, and transparent rate-limit quotas."
